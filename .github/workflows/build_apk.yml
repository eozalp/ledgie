name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Install Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Regenerate Android project
        run: |
          rm -rf android/
          flutter create --platforms=android --org com.ledgie .
          sed -i 's/applicationId "com.ledgie.ledgie"/applicationId "com.ledgie.app"/' android/app/build.gradle
          sed -i 's/namespace "com.ledgie.ledgie"/namespace "com.ledgie.app"/' android/app/build.gradle

      - name: Build debug APK
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ledgie-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
