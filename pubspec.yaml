name: ledgie
description: Smart Personal Ledger — hledger-compatible finance tracker
publish_to: 'none'
version: 1.3.0+13

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State management
  provider: ^6.1.2
  # Persistence
  shared_preferences: ^2.3.2
  # File I/O
  file_picker: ^8.1.2
  path_provider: ^2.1.4
  # Charts
  fl_chart: ^0.69.0
  # UI extras
  google_fonts: ^6.2.1
  intl: ^0.19.0
  share_plus: ^10.1.2
  # Icons
  material_design_icons_flutter: ^7.0.7296

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sample_ledger.hledger
